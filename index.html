<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front-End Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="data.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 leading-relaxed">

    <header class="bg-white border-b border-slate-200 py-20 px-6">
        <div class="max-w-5xl mx-auto">
            <h1 class="text-5xl font-black tracking-tight mb-4">Front-End Developer <span class="text-blue-600">&</span> Designer</h1>
            <p class="text-xl text-slate-600 max-w-2xl">Specializing in high-impact campaign pages for global NGOs, luxury brands, and political movements.</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-16" x-data="portfolioData">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <template x-for="project in projects" :key="project.name">
                <div class="group">
                    <div class="aspect-video bg-slate-200 rounded-lg overflow-hidden mb-4 shadow-sm group-hover:shadow-xl group-hover:-translate-y-1 transition-all duration-300">
                        <img :src="project.image" :alt="project.name" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500">
                    </div>
                    
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xs font-bold uppercase tracking-widest text-blue-600 mb-1" x-text="project.category"></p>
                            <h3 class="text-xl font-bold mb-2" x-text="project.name"></h3>
                            <div class="flex gap-2 mb-4">
                                <template x-for="tag in project.tags">
                                    <span class="text-[10px] bg-slate-200 px-2 py-0.5 rounded text-slate-700 font-medium" x-text="tag"></span>
                                </template>
                            </div>
                        </div>
                        <a :href="project.url" target="_blank" class="bg-slate-900 text-white p-2 rounded-full hover:bg-blue-600 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </a>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <footer class="border-t border-slate-200 py-10 text-center text-slate-400 text-sm">
        Built with Alpine.js & Tailwind CSS. Hosted on GitHub Pages.
    </footer>

</body>
</html>
