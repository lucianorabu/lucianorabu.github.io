<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCHO RABU | PORTFOLIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="data.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; overflow-x: hidden; }
        
        .animated-main {
            background: linear-gradient(-45deg, #1e3a8a, #991b1b, #854d0e, #1e40af);
            background-size: 400% 400%;
            animation: bauhaus-pulse 20s ease-in-out infinite;
            position: relative;
        }

        .animated-main::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); pointer-events: none; z-index: 0;
        }

        @keyframes bauhaus-pulse {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .masonry-grid { position: relative; z-index: 10; column-count: 1; column-gap: 1.5rem; }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1440px) { .masonry-grid { column-count: 4; } }

        .masonry-item { break-inside: avoid; margin-bottom: 1.5rem; }
        .bau-0 { border-top: 5px solid #2563eb; }
        .bau-1 { border-top: 5px solid #dc2626; }
        .bau-2 { border-top: 5px solid #facc15; }
        .bau-3 { border-top: 5px solid #ffffff; }

        .link-glitch:hover { text-shadow: 2px 0 #2563eb, -2px 0 #dc2626; }
        .card-transition { transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
    </style>
</head>
<body class="antialiased font-mono">

    <div class="flex flex-col md:flex-row min-h-screen">
        
        <header class="w-full md:w-52 md:fixed h-full border-b md:border-b-0 md:border-r border-neutral-900 p-6 flex flex-col justify-between z-50 bg-[#0a0a0a]">
            <div>
                <h1 class="text-3xl font-black tracking-tighter leading-none mb-1 italic text-white">LUCHO<br>RABU</h1>
                <p class="text-[8px] uppercase tracking-[0.2em] text-neutral-500 mb-10 font-bold underline decoration-blue-500 underline-offset-8">Front-end Systems</p>
                
                <nav class="space-y-4 text-[10px] tracking-widest font-bold uppercase">
                    <a href="mailto:luciano.rabu@gmail.com" class="block hover:text-white transition-colors text-neutral-400 border-b border-transparent hover:border-red-500 w-fit">CONTACT</a>
                </nav>
            </div>
            <div class="mt-10 text-[9px] text-neutral-800 tracking-tighter uppercase leading-tight font-sans">
                Engine: Mobile_Logic_v1<br>Input: Tap_to_Preview<br>Status: Running
            </div>
        </header>

        <main class="flex-1 md:ml-52 p-6 lg:p-10 animated-main">
            <div class="masonry-grid" x-data="portfolioData">
                
                <template x-for="(project, index) in projects" :key="project.name">
                    <div class="masonry-item p-6 flex flex-col card-transition cursor-crosshair border border-transparent shadow-xl"
                         x-data="{ 
                            activeLink: project.links[0].url,
                            activeImage: project.links[0].img, 
                            isHoveringCard: false,
                            isSpecificLinkHovered: false
                         }"
                         @mouseenter="isHoveringCard = true"
                         @mouseleave="isHoveringCard = false; isSpecificLinkHovered = false; activeLink = project.links[0].url; activeImage = project.links[0].img"
                         :class="'bau-' + (index % 4)"
                         :style="isHoveringCard ? 'background-color: #ffffff; color: #111111; transform: translateY(-10px) scale(1.02);' : 'background-color: #121212; color: #e5e5e5;'">
                        
                        <div class="mb-4">
                            <span class="text-[10px] uppercase tracking-[0.4em] font-bold mb-2 block" 
                                  :class="isHoveringCard ? 'text-neutral-400' : 'text-neutral-600'"
                                  x-text="project.category"></span>
                            
                            <h2 class="text-xl font-bold tracking-tighter mb-6 uppercase leading-none card-transition"
                                :class="isHoveringCard ? 'text-black' : 'text-white'"
                                x-text="project.name"></h2>
                            
                            <ul class="space-y-3">
                                <template x-for="link in project.links" :key="link.url">
                                    <li>
                                        <a :href="link.url" 
                                           target="_blank" 
                                           @click.prevent="activeImage = link.img; activeLink = link.url; isSpecificLinkHovered = true; isHoveringCard = true"
                                           @mouseenter="activeImage = link.img; activeLink = link.url; isSpecificLinkHovered = true"
                                           @mouseleave="isSpecificLinkHovered = false"
                                           class="flex items-center tracking-tight transition-all group link-glitch font-medium text-xs"
                                           :class="activeLink === link.url && isHoveringCard ? 'text-black translate-x-2' : (isHoveringCard ? 'text-neutral-400' : 'text-neutral-400')">
                                            
                                            <span class="mr-2 font-bold transition-colors"
                                                  :class="activeLink === link.url ? 'text-blue-600 opacity-100' : 'opacity-20'">/</span>
                                            
                                            <span x-text="link.label" class="inline-block transition-transform"></span>
                                        </a>
                                    </li>
                                </template>
                            </ul>
                        </div>

                        <div class="mt-auto pt-4">
                            <a :href="activeLink" target="_blank" class="block group/img">
                                <div class="w-full aspect-video bg-black overflow-hidden relative border card-transition"
                                     :class="isHoveringCard ? 'border-neutral-200 shadow-inner' : 'border-neutral-800'">
                                    <img :src="activeImage" 
                                         class="w-full h-full object-cover transition-all duration-700 ease-out"
                                         :class="{
                                            'grayscale opacity-40 scale-100': !isHoveringCard,
                                            'grayscale-0 opacity-100 scale-100': isHoveringCard && !isSpecificLinkHovered,
                                            'grayscale-0 opacity-100 scale-110': isSpecificLinkHovered
                                         }"
                                         :alt="project.name">
                                </div>
                            </a>
                        </div>
                    </div>
                </template>

            </div>

            <footer class="mt-20 py-10 text-[8px] tracking-[0.6em] text-white/20 uppercase text-center relative z-10">
                Lucho Rabu // Studio_2026 // Mobile_Enhanced
            </footer>
        </main>
    </div>

</body>
</html>
